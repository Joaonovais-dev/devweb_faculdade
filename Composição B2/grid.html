<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid De imagens</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
        }

        .grid-item {
            background-color: #f7f7f7;
            border: 2px solid #333;
            padding: 12px;
            text-align: center;
        }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 8px;
        }

        .grid-item figcaption {
            font-size: 0.95rem;
            color: #333;
        }

        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                padding: 16px;
            }
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
                padding: 12px;
            }

            .grid-item {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Grid De imagens</h1>
    </header>
     <nav>

 <li><a href="grid.html">Grid</a></li>
        </ul>
    </nav>
